name: cd-image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: shared
    env:
      IMAGE_REPO: ${{ vars.MAXBRIDGE_IMAGE_REPO }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate image repository config
        run: |
          if [ -z "${IMAGE_REPO}" ]; then
            echo "Environment variable MAXBRIDGE_IMAGE_REPO is required (example: docker.io/<user>/maxbridge)."
            exit 1
          fi

      - name: Validate registry credentials
        run: |
          if [ -z "${REGISTRY_USERNAME}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "shared environment secrets REGISTRY_USERNAME and REGISTRY_PASSWORD are required."
            exit 1
          fi

      - name: Resolve registry host
        id: registry
        run: |
          repo="${IMAGE_REPO}"
          first_segment="${repo%%/*}"
          if [[ "${first_segment}" == *.* || "${first_segment}" == *:* || "${first_segment}" == "localhost" ]]; then
            registry_host="${first_segment}"
          else
            registry_host="docker.io"
          fi
          echo "host=${registry_host}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:sha-${short_sha}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${IMAGE_REPO}:main"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_REPO}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
            echo "primary_tag=sha-${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft
        run: |
          set -euo pipefail
          SYFT_VERSION="v1.24.0"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"

      - name: Generate SBOM
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REPO}:${{ steps.tags.outputs.primary_tag }}"
          syft "${image_ref}" -o spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.tags.outputs.primary_tag }}
          path: sbom.spdx.json
          if-no-files-found: error

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ steps.tags.outputs.primary_tag }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          severity: HIGH,CRITICAL

      - name: Publish summary
        run: |
          {
            echo "### Pushed image tags"
            echo
            echo '${{ steps.tags.outputs.tags }}'
            echo
            echo "Primary deployment tag: \`${{ steps.tags.outputs.primary_tag }}\`"
            echo
            echo "SBOM artifact: sbom-${{ steps.tags.outputs.primary_tag }}"
          } >> "${GITHUB_STEP_SUMMARY}"
