name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vuln-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/bridge
          go build ./cmd/worker
          go build ./cmd/tui
      - name: Build container
        run: docker build -t maxbridge:${{ github.sha }} .
