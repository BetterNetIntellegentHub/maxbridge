name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/bridge
          go build ./cmd/worker
          go build ./cmd/tui
      - name: Build container
        run: docker build -t maxbridge:${{ github.sha }} .
