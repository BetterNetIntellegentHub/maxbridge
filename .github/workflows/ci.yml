name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - name: Validate GitHub workflows
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Ensure shellcheck is available
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
      - name: Shellcheck scripts
        run: shellcheck -x scripts/*.sh scripts/maxbridge

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Ensure yamllint is available
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade yamllint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml .github/workflows
          yamllint -c .yamllint.yml deploy/ansible
          yamllint -c .yamllint.yml deploy/compose

  forbidden-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check forbidden tracked files
        run: bash ./scripts/check-forbidden-files.sh

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          gobin_path="$(go env GOPATH)/bin:$(go env GOROOT)/bin"
          export PATH="${gobin_path}:$PATH"
          staticcheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gobin_path="$(go env GOPATH)/bin:$(go env GOROOT)/bin"
          export PATH="${gobin_path}:$PATH"
          gosec ./...

  vuln-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/bridge
          go build ./cmd/worker
          go build ./cmd/tui
      - name: Build container
        run: docker build -t maxbridge:${{ github.sha }} .

  image-security-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build local image for security gate
        run: |
          set -euo pipefail
          docker build -t maxbridge:gate-${{ github.sha }} .
      - name: Install Syft (pinned + checksum verification)
        run: |
          set -euo pipefail
          SYFT_VERSION="v1.24.0"
          SYFT_ARCHIVE="syft_${SYFT_VERSION#v}_linux_amd64.tar.gz"
          CHECKSUMS_FILE="syft_${SYFT_VERSION#v}_checksums.txt"
          curl -sSfL -o "${SYFT_ARCHIVE}" "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${SYFT_ARCHIVE}"
          curl -sSfL -o "${CHECKSUMS_FILE}" "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${CHECKSUMS_FILE}"
          grep " ${SYFT_ARCHIVE}$" "${CHECKSUMS_FILE}" | sha256sum -c -
          tar -xzf "${SYFT_ARCHIVE}" syft
          install -m 0755 syft "${RUNNER_TEMP}/syft"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - name: Generate SBOM
        run: |
          set -euo pipefail
          syft maxbridge:gate-${{ github.sha }} -o spdx-json=sbom.gate.spdx.json
      - name: Scan local image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: maxbridge:gate-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          severity: HIGH,CRITICAL
      - name: Cleanup gate artifacts
        if: always()
        run: |
          rm -f syft syft_*.tar.gz syft_*_checksums.txt sbom.gate.spdx.json
          docker image rm -f maxbridge:gate-${{ github.sha }} >/dev/null 2>&1 || true
