name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          export PATH="$(go env GOPATH)/bin:$(go env GOROOT)/bin:$PATH"
          staticcheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          export PATH="$(go env GOPATH)/bin:$(go env GOROOT)/bin:$PATH"
          gosec ./...

  vuln-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/bridge
          go build ./cmd/worker
          go build ./cmd/tui
      - name: Build container
        run: docker build -t maxbridge:${{ github.sha }} .
