maxbridge_app_dir: /opt/maxbridge
maxbridge_compose_dir: "{{ maxbridge_app_dir }}/compose"
maxbridge_secrets_dir: "{{ maxbridge_app_dir }}/secrets"

maxbridge_version: "latest"
maxbridge_image: "registry.example.com/maxbridge:{{ maxbridge_version }}"
maxbridge_domain: "bridge.argus-translit.ru"
maxbridge_https_port: 8443

# Container registry auth (used for private image repos)
maxbridge_registry_private: true
maxbridge_registry_url: "https://index.docker.io/v1/"
maxbridge_registry_username: "argusvlad"

# Secrets management mode:
# true  -> create/manage secrets directly on target host (no manual server console work)
# false -> copy pre-prepared files from maxbridge_secrets_src on Ansible controller
maxbridge_manage_secrets: true
maxbridge_secrets_src: "{{ playbook_dir }}/../compose/secrets"

# Required external tokens (set via Ansible Vault in real deployments)
maxbridge_telegram_bot_token: ""
maxbridge_max_bot_token: ""

# Optional secret overrides (if empty and manage_secrets=true, values are generated once)
maxbridge_postgres_password: ""
maxbridge_invite_hash_pepper: ""
maxbridge_telegram_webhook_secret: ""
maxbridge_max_webhook_secret: ""
maxbridge_backup_encryption_key: ""

# DB DSN configuration
# If maxbridge_db_dsn is empty, it is composed from host/user/password/db/sslmode values below.
maxbridge_db_dsn: ""
maxbridge_db_host: "postgres"
maxbridge_db_port: 5432
maxbridge_db_user: "maxbridge"
maxbridge_db_name: "maxbridge"
maxbridge_db_sslmode: "disable"

# Post-deploy health check
maxbridge_healthcheck_url: "https://{{ maxbridge_domain }}:{{ maxbridge_https_port }}/health/ready"
maxbridge_healthcheck_validate_certs: false

# Backup schedule (systemd OnCalendar format)
maxbridge_backup_schedule: "*-*-* 03:10:00"
