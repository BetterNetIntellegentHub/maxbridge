- name: Ensure app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: maxbridge
    group: maxbridge
    mode: '0750'
  loop:
    - "{{ maxbridge_app_dir }}"
    - "{{ maxbridge_compose_dir }}"
    - "{{ maxbridge_compose_dir }}/nginx"
    - "{{ maxbridge_compose_dir }}/nginx/certs"
    - "{{ maxbridge_compose_dir }}/secrets"
    - "{{ maxbridge_secrets_dir }}"

- name: Copy compose file
  copy:
    src: "{{ playbook_dir }}/../compose/docker-compose.yml"
    dest: "{{ maxbridge_compose_dir }}/docker-compose.yml"
    owner: maxbridge
    group: maxbridge
    mode: '0640'

- name: Copy nginx config
  copy:
    src: "{{ playbook_dir }}/../compose/nginx/nginx.conf"
    dest: "{{ maxbridge_compose_dir }}/nginx/nginx.conf"
    owner: maxbridge
    group: maxbridge
    mode: '0640'

- name: Write compose env file
  copy:
    dest: "{{ maxbridge_compose_dir }}/.env"
    owner: maxbridge
    group: maxbridge
    mode: '0640'
    content: |
      BRIDGE_IMAGE={{ maxbridge_image }}
      NGINX_HTTPS_PORT={{ maxbridge_https_port }}

- name: Manage secrets on host
  when: maxbridge_manage_secrets | bool
  block:
    - name: Check existing generated secrets
      stat:
        path: "{{ maxbridge_secrets_dir }}/{{ item }}"
      loop:
        - postgres_password
        - invite_hash_pepper
        - telegram_webhook_secret
        - max_webhook_secret
        - backup_encryption_key
      register: maxbridge_generated_secret_stats

    - name: Set generated secret values
      set_fact:
        maxbridge_postgres_password_effective: "{{ (maxbridge_postgres_password | default('', true) | trim) if (maxbridge_postgres_password | default('', true) | trim | length > 0) else lookup('password', '/dev/null length=24 chars=hexdigits') }}"
        maxbridge_invite_hash_pepper_effective: "{{ (maxbridge_invite_hash_pepper | default('', true) | trim) if (maxbridge_invite_hash_pepper | default('', true) | trim | length > 0) else lookup('password', '/dev/null length=32 chars=hexdigits') }}"
        maxbridge_telegram_webhook_secret_effective: "{{ (maxbridge_telegram_webhook_secret | default('', true) | trim) if (maxbridge_telegram_webhook_secret | default('', true) | trim | length > 0) else lookup('password', '/dev/null length=32 chars=hexdigits') }}"
        maxbridge_max_webhook_secret_effective: "{{ (maxbridge_max_webhook_secret | default('', true) | trim) if (maxbridge_max_webhook_secret | default('', true) | trim | length > 0) else lookup('password', '/dev/null length=32 chars=hexdigits') }}"
        maxbridge_backup_encryption_key_effective: "{{ (maxbridge_backup_encryption_key | default('', true) | trim) if (maxbridge_backup_encryption_key | default('', true) | trim | length > 0) else lookup('password', '/dev/null length=48 chars=hexdigits') }}"
      no_log: true

    - name: Load existing generated secrets if present
      slurp:
        path: "{{ maxbridge_secrets_dir }}/{{ item.key }}"
      loop:
        - { key: "postgres_password", fact_name: "maxbridge_postgres_password_effective" }
        - { key: "invite_hash_pepper", fact_name: "maxbridge_invite_hash_pepper_effective" }
        - { key: "telegram_webhook_secret", fact_name: "maxbridge_telegram_webhook_secret_effective" }
        - { key: "max_webhook_secret", fact_name: "maxbridge_max_webhook_secret_effective" }
        - { key: "backup_encryption_key", fact_name: "maxbridge_backup_encryption_key_effective" }
      when: (maxbridge_generated_secret_stats.results | selectattr('item', 'equalto', item.key) | first).stat.exists
      register: maxbridge_existing_generated_secrets
      no_log: true

    - name: Override generated secret values from existing files
      set_fact:
        "{{ item.item.fact_name }}": "{{ item.content | b64decode | trim }}"
      loop: "{{ (maxbridge_existing_generated_secrets.results | default([])) | rejectattr('skipped', 'defined') | list }}"
      no_log: true

    - name: Check existing bot token files
      stat:
        path: "{{ maxbridge_secrets_dir }}/{{ item }}"
      loop:
        - telegram_bot_token
        - max_bot_token
      register: maxbridge_bot_token_stats

    - name: Require Telegram bot token input or existing secret
      assert:
        that:
          - (maxbridge_telegram_bot_token | default('', true) | trim | length > 0) or ((maxbridge_bot_token_stats.results | selectattr('item', 'equalto', 'telegram_bot_token') | first).stat.exists)
        fail_msg: "Telegram bot token is missing. Set maxbridge_telegram_bot_token (preferably via Ansible Vault) or provide existing {{ maxbridge_secrets_dir }}/telegram_bot_token."

    - name: Require MAX bot token input or existing secret
      assert:
        that:
          - (maxbridge_max_bot_token | default('', true) | trim | length > 0) or ((maxbridge_bot_token_stats.results | selectattr('item', 'equalto', 'max_bot_token') | first).stat.exists)
        fail_msg: "MAX bot token is missing. Set maxbridge_max_bot_token (preferably via Ansible Vault) or provide existing {{ maxbridge_secrets_dir }}/max_bot_token."

    - name: Set bot token facts from vars
      set_fact:
        maxbridge_telegram_bot_token_effective: "{{ maxbridge_telegram_bot_token | default('', true) | trim }}"
        maxbridge_max_bot_token_effective: "{{ maxbridge_max_bot_token | default('', true) | trim }}"
      no_log: true

    - name: Read existing bot token files when vars are empty
      slurp:
        path: "{{ maxbridge_secrets_dir }}/{{ item.key }}"
      loop:
        - { key: "telegram_bot_token", fact_name: "maxbridge_telegram_bot_token_effective" }
        - { key: "max_bot_token", fact_name: "maxbridge_max_bot_token_effective" }
      when:
        - (item.fact_name == 'maxbridge_telegram_bot_token_effective' and (maxbridge_telegram_bot_token_effective | length == 0)) or
          (item.fact_name == 'maxbridge_max_bot_token_effective' and (maxbridge_max_bot_token_effective | length == 0))
      register: maxbridge_existing_bot_tokens
      no_log: true

    - name: Override bot token facts from existing files
      set_fact:
        "{{ item.item.fact_name }}": "{{ item.content | b64decode | trim }}"
      loop: "{{ (maxbridge_existing_bot_tokens.results | default([])) | rejectattr('skipped', 'defined') | list }}"
      no_log: true

    - name: Compose DB DSN value
      set_fact:
        maxbridge_db_dsn_effective: "{{ (maxbridge_db_dsn | default('', true) | trim) if (maxbridge_db_dsn | default('', true) | trim | length > 0) else ('postgres://' + maxbridge_db_user + ':' + (maxbridge_postgres_password_effective | urlencode) + '@' + maxbridge_db_host + ':' + (maxbridge_db_port | string) + '/' + maxbridge_db_name + '?sslmode=' + maxbridge_db_sslmode) }}"
      no_log: true

    - name: Write managed secret files
      copy:
        dest: "{{ maxbridge_secrets_dir }}/{{ item.name }}"
        content: "{{ item.value }}\n"
        owner: maxbridge
        group: maxbridge
        mode: '0400'
      loop:
        - { name: "db_dsn", value: "{{ maxbridge_db_dsn_effective }}" }
        - { name: "postgres_password", value: "{{ maxbridge_postgres_password_effective }}" }
        - { name: "invite_hash_pepper", value: "{{ maxbridge_invite_hash_pepper_effective }}" }
        - { name: "telegram_bot_token", value: "{{ maxbridge_telegram_bot_token_effective }}" }
        - { name: "telegram_webhook_secret", value: "{{ maxbridge_telegram_webhook_secret_effective }}" }
        - { name: "max_bot_token", value: "{{ maxbridge_max_bot_token_effective }}" }
        - { name: "max_webhook_secret", value: "{{ maxbridge_max_webhook_secret_effective }}" }
        - { name: "backup_encryption_key", value: "{{ maxbridge_backup_encryption_key_effective }}" }
      no_log: true

    - name: Sync managed secrets to compose secrets directory
      copy:
        src: "{{ maxbridge_secrets_dir }}/"
        dest: "{{ maxbridge_compose_dir }}/secrets/"
        remote_src: true
        owner: maxbridge
        group: maxbridge
        mode: '0400'

- name: Sync secrets directory from controller to host secrets dir
  copy:
    src: "{{ maxbridge_secrets_src }}/"
    dest: "{{ maxbridge_secrets_dir }}/"
    owner: maxbridge
    group: maxbridge
    mode: '0400'
  when: not (maxbridge_manage_secrets | bool)

- name: Sync controller-provided secrets to compose secrets directory
  copy:
    src: "{{ maxbridge_secrets_dir }}/"
    dest: "{{ maxbridge_compose_dir }}/secrets/"
    remote_src: true
    owner: maxbridge
    group: maxbridge
    mode: '0400'
  when: not (maxbridge_manage_secrets | bool)

- name: Require registry credentials in private mode
  assert:
    that:
      - maxbridge_registry_username | default('', true) | trim | length > 0
      - maxbridge_registry_token | default('', true) | trim | length > 0
    fail_msg: "Private registry mode is enabled. Set maxbridge_registry_username and maxbridge_registry_token (preferably via Ansible Vault)."
  when: maxbridge_registry_private | bool

- name: Login to image registry
  community.docker.docker_login:
    registry_url: "{{ maxbridge_registry_url }}"
    username: "{{ maxbridge_registry_username | trim }}"
    password: "{{ maxbridge_registry_token | trim }}"
    reauthorize: true
  when:
    - maxbridge_registry_username | default('', true) | trim | length > 0
    - maxbridge_registry_token | default('', true) | trim | length > 0
  no_log: true

- name: Pull image
  community.docker.docker_compose_v2:
    project_src: "{{ maxbridge_compose_dir }}"
    pull: always

- name: Run migrations
  command: docker compose -f {{ maxbridge_compose_dir }}/docker-compose.yml run --rm bridge /app/bridge migrate up
  register: migrate_out
  changed_when: "'done' in migrate_out.stdout"

- name: Start stack
  community.docker.docker_compose_v2:
    project_src: "{{ maxbridge_compose_dir }}"
    state: present

- name: Health check bridge
  uri:
    url: "{{ maxbridge_healthcheck_url }}"
    method: GET
    validate_certs: "{{ maxbridge_healthcheck_validate_certs }}"
    status_code: 200
