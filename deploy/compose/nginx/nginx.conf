worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server_tokens off;
  client_max_body_size 256k;

  limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=20r/s;

  upstream bridge_upstream {
    server bridge:8080;
    keepalive 32;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location = /webhooks/telegram {
      limit_except POST { deny all; }
      limit_req zone=webhook_zone burst=40 nodelay;
      proxy_read_timeout 10s;
      proxy_connect_timeout 3s;
      proxy_send_timeout 10s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://bridge_upstream;
    }

    location = /webhooks/max {
      limit_except POST { deny all; }
      limit_req zone=webhook_zone burst=40 nodelay;
      proxy_read_timeout 10s;
      proxy_connect_timeout 3s;
      proxy_send_timeout 10s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://bridge_upstream;
    }

    location /health/ {
      proxy_pass http://bridge_upstream;
    }

    location /metrics {
      allow 127.0.0.1;
      deny all;
      proxy_pass http://bridge_upstream;
    }
  }
}
