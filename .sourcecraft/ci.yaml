env:
  GOTOOLCHAIN: local

on:
  pull_request:
    - workflows: [ci-checks]
      filter:
        source_branches: ["**"]
        target_branches: ["main"]

  push:
    - workflows: [ci-checks]
      filter:
        branches: ["main"]
    - workflows: [image-publish]
      filter:
        branches: ["main"]
    - workflows: [image-publish]
      filter:
        tags: ["v*"]

  workflow_dispatch:
    - workflows: [deploy-staging, rollback-staging, deploy-production, rollback-production]

tasks:
  - name: lint-security
    cubes:
      - name: actionlint
        image: docker.io/library/golang:1.25.8
        script:
          - go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
      - name: gitleaks
        image: docker.io/zricethezav/gitleaks:v8.24.2
        script:
          - gitleaks git --redact --no-banner --exit-code 1
      - name: staticcheck
        image: docker.io/library/golang:1.25.8
        script:
          - go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          - export PATH="$(go env GOPATH)/bin:$(go env GOROOT)/bin:$PATH"
          - staticcheck ./...
      - name: gosec
        image: docker.io/library/golang:1.25.8
        script:
          - go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          - export PATH="$(go env GOPATH)/bin:$(go env GOROOT)/bin:$PATH"
          - gosec ./...
      - name: govulncheck
        image: docker.io/library/golang:1.25.8
        script:
          - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  - name: test-build
    cubes:
      - name: test-and-build
        image: docker.io/library/golang:1.25.8
        script:
          - go test ./...
          - go build ./cmd/bridge
          - go build ./cmd/worker
          - go build ./cmd/tui
      - name: docker-build-smoke
        script:
          - docker version
          - docker build -t maxbridge:${SC_COMMIT_SHA} .

  - name: image-publish-task
    cubes:
      - name: build-push-sbom-scan
        script:
          - |
            set -euo pipefail

            if [ -z "${{ secrets.MAXBRIDGE_IMAGE_REPO }}" ] || [ -z "${{ secrets.REGISTRY_USERNAME }}" ] || [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
              echo "MAXBRIDGE_IMAGE_REPO, REGISTRY_USERNAME and REGISTRY_PASSWORD are required"
              exit 1
            fi

            short_sha="${SC_COMMIT_SHA:0:12}"
            image_repo="${{ secrets.MAXBRIDGE_IMAGE_REPO }}"
            primary_ref="${image_repo}:sha-${short_sha}"
            tags=("${primary_ref}")

            if [ "${SC_BRANCH:-}" = "main" ]; then
              tags+=("${image_repo}:main")
            fi
            if [ -n "${SC_TAG:-}" ]; then
              tags+=("${image_repo}:${SC_TAG}")
            fi

            first_segment="${image_repo%%/*}"
            if [[ "${first_segment}" == *.* || "${first_segment}" == *:* || "${first_segment}" == "localhost" ]]; then
              registry_host="${first_segment}"
            else
              registry_host="docker.io"
            fi

            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${registry_host}" --username "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            build_args=()
            for tag in "${tags[@]}"; do
              build_args+=("-t" "${tag}")
            done
            docker build "${build_args[@]}" .

            for tag in "${tags[@]}"; do
              docker push "${tag}"
            done

            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/work" anchore/syft:v1.24.0 "${primary_ref}" -o spdx-json=/work/sbom.spdx.json
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image --exit-code 1 --severity HIGH,CRITICAL --no-progress "${primary_ref}"

workflows:
  ci-checks:
    tasks:
      - lint-security
      - test-build

  image-publish:
    runs_on: [self-hosted, wsl-deploy]
    tasks:
      - image-publish-task

  deploy-staging:
    runs_on: [self-hosted, linux, x64, wsl-deploy]
    inputs:
      IMAGE_TAG:
        type: string
        required: true
        description: "Immutable image tag (sha-<12> or vX.Y.Z)"
    tasks:
      - name: deploy-staging-task
        cubes:
          - name: deploy
            script:
              - |
                set -euo pipefail
                lock_file="/tmp/maxbridge-staging.lock"
                exec 9>"${lock_file}"
                flock 9

                for var_name in DEPLOY_HOST DEPLOY_USER MAXBRIDGE_DOMAIN MAXBRIDGE_HTTPS_PORT DEPLOY_SSH_KEY_PATH DEPLOY_SSH_KNOWN_HOSTS_PATH; do
                  value="$(printenv "${var_name}" || true)"
                  if [ -z "${value}" ]; then
                    echo "Missing variable: ${var_name}"
                    exit 1
                  fi
                done

                if ! command -v jq >/dev/null 2>&1 || ! command -v ansible-playbook >/dev/null 2>&1; then
                  echo "jq and ansible-playbook are required on self-hosted worker"
                  exit 1
                fi

                image_tag="${{ inputs.IMAGE_TAG }}"
                ssh_key_path="${DEPLOY_SSH_KEY_PATH}"
                known_hosts_path="${DEPLOY_SSH_KNOWN_HOSTS_PATH}"
                chmod 600 "${ssh_key_path}" "${known_hosts_path}"

                tmp_dir=".ci-runtime"
                runtime_vars_file="${tmp_dir}/ansible-runtime-vars.json"
                inventory_file="${tmp_dir}/hosts.yml"
                cleanup() { rm -rf "${tmp_dir}"; }
                trap cleanup EXIT
                mkdir -p "${tmp_dir}"

                jq -n \
                  --arg version "${image_tag}" \
                  --arg image "${{ secrets.MAXBRIDGE_IMAGE_REPO }}:${image_tag}" \
                  --arg domain "${MAXBRIDGE_DOMAIN}" \
                  --arg https_port "${MAXBRIDGE_HTTPS_PORT}" \
                  --arg health_url "https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}/health/ready" \
                  --arg telegram_token "${{ secrets.MAXBRIDGE_TELEGRAM_BOT_TOKEN }}" \
                  --arg max_token "${{ secrets.MAXBRIDGE_MAX_BOT_TOKEN }}" \
                  --arg registry_token "${{ secrets.MAXBRIDGE_REGISTRY_TOKEN }}" \
                  '{maxbridge_version: $version, maxbridge_image: $image, maxbridge_domain: $domain, maxbridge_https_port: ($https_port | tonumber), maxbridge_healthcheck_url: $health_url, maxbridge_telegram_bot_token: $telegram_token, maxbridge_max_bot_token: $max_token, maxbridge_registry_token: $registry_token}' > "${runtime_vars_file}"

                cat > "${inventory_file}" <<INV
                all:
                  hosts:
                    maxbridge-staging-1:
                      ansible_host: ${DEPLOY_HOST}
                      ansible_user: ${DEPLOY_USER}
                      ansible_ssh_private_key_file: ${ssh_key_path}
                      ansible_ssh_common_args: '-o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts_path}'
                INV

                ansible-galaxy collection install community.docker
                ansible-playbook -i "${inventory_file}" deploy/ansible/deploy.yml --extra-vars "@${runtime_vars_file}"

                base_url="https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}"
                curl -ksSf "${base_url}/health/ready" >/dev/null
                checks="$(curl -ksSf "${base_url}/health/checks")"
                printf "%s" "${checks}" | jq -e '(.queue | type == "object") and (.queue.pending | type == "number") and (.queue.retry | type == "number") and (.queue.dead_letter | type == "number")' >/dev/null

  rollback-staging:
    runs_on: [self-hosted, linux, x64, wsl-deploy]
    inputs:
      ROLLBACK_IMAGE_TAG:
        type: string
        required: true
        description: "Previously known-good immutable image tag"
    tasks:
      - name: rollback-staging-task
        cubes:
          - name: rollback
            script:
              - |
                set -euo pipefail
                lock_file="/tmp/maxbridge-staging.lock"
                exec 9>"${lock_file}"
                flock 9

                for var_name in DEPLOY_HOST DEPLOY_USER MAXBRIDGE_DOMAIN MAXBRIDGE_HTTPS_PORT DEPLOY_SSH_KEY_PATH DEPLOY_SSH_KNOWN_HOSTS_PATH; do
                  value="$(printenv "${var_name}" || true)"
                  if [ -z "${value}" ]; then
                    echo "Missing variable: ${var_name}"
                    exit 1
                  fi
                done

                if ! command -v jq >/dev/null 2>&1 || ! command -v ansible-playbook >/dev/null 2>&1; then
                  echo "jq and ansible-playbook are required on self-hosted worker"
                  exit 1
                fi

                image_tag="${{ inputs.ROLLBACK_IMAGE_TAG }}"
                ssh_key_path="${DEPLOY_SSH_KEY_PATH}"
                known_hosts_path="${DEPLOY_SSH_KNOWN_HOSTS_PATH}"
                chmod 600 "${ssh_key_path}" "${known_hosts_path}"

                tmp_dir=".ci-runtime"
                runtime_vars_file="${tmp_dir}/ansible-runtime-vars.json"
                inventory_file="${tmp_dir}/hosts.yml"
                cleanup() { rm -rf "${tmp_dir}"; }
                trap cleanup EXIT
                mkdir -p "${tmp_dir}"

                jq -n \
                  --arg version "${image_tag}" \
                  --arg image "${{ secrets.MAXBRIDGE_IMAGE_REPO }}:${image_tag}" \
                  --arg domain "${MAXBRIDGE_DOMAIN}" \
                  --arg https_port "${MAXBRIDGE_HTTPS_PORT}" \
                  --arg health_url "https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}/health/ready" \
                  --arg telegram_token "${{ secrets.MAXBRIDGE_TELEGRAM_BOT_TOKEN }}" \
                  --arg max_token "${{ secrets.MAXBRIDGE_MAX_BOT_TOKEN }}" \
                  --arg registry_token "${{ secrets.MAXBRIDGE_REGISTRY_TOKEN }}" \
                  '{maxbridge_version: $version, maxbridge_image: $image, maxbridge_domain: $domain, maxbridge_https_port: ($https_port | tonumber), maxbridge_healthcheck_url: $health_url, maxbridge_telegram_bot_token: $telegram_token, maxbridge_max_bot_token: $max_token, maxbridge_registry_token: $registry_token}' > "${runtime_vars_file}"

                cat > "${inventory_file}" <<INV
                all:
                  hosts:
                    maxbridge-staging-1:
                      ansible_host: ${DEPLOY_HOST}
                      ansible_user: ${DEPLOY_USER}
                      ansible_ssh_private_key_file: ${ssh_key_path}
                      ansible_ssh_common_args: '-o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts_path}'
                INV

                ansible-galaxy collection install community.docker
                ansible-playbook -i "${inventory_file}" deploy/ansible/deploy.yml --extra-vars "@${runtime_vars_file}"

                base_url="https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}"
                curl -ksSf "${base_url}/health/ready" >/dev/null
                checks="$(curl -ksSf "${base_url}/health/checks")"
                printf "%s" "${checks}" | jq -e '(.queue | type == "object") and (.queue.pending | type == "number") and (.queue.retry | type == "number") and (.queue.dead_letter | type == "number")' >/dev/null

  deploy-production:
    runs_on: [self-hosted, linux, x64, wsl-deploy]
    inputs:
      IMAGE_TAG:
        type: string
        required: true
      PRODUCTION_CONFIRM:
        type: string
        required: true
        description: "Type DEPLOY_PRODUCTION"
    tasks:
      - name: deploy-production-task
        cubes:
          - name: deploy
            script:
              - |
                set -euo pipefail
                if [ "${{ inputs.PRODUCTION_CONFIRM }}" != "DEPLOY_PRODUCTION" ]; then
                  echo "Set PRODUCTION_CONFIRM=DEPLOY_PRODUCTION"
                  exit 1
                fi

                allowed_user="${ALLOWED_PROD_USER:-BetterNetIntellegentHub}"
                if [ "${SC_USER_LOGIN:-}" != "${allowed_user}" ]; then
                  echo "Production deploy is allowed only for ${allowed_user}"
                  exit 1
                fi

                lock_file="/tmp/maxbridge-production.lock"
                exec 9>"${lock_file}"
                flock 9

                for var_name in DEPLOY_HOST DEPLOY_USER MAXBRIDGE_DOMAIN MAXBRIDGE_HTTPS_PORT DEPLOY_SSH_KEY_PATH DEPLOY_SSH_KNOWN_HOSTS_PATH; do
                  value="$(printenv "${var_name}" || true)"
                  if [ -z "${value}" ]; then
                    echo "Missing variable: ${var_name}"
                    exit 1
                  fi
                done

                if ! command -v jq >/dev/null 2>&1 || ! command -v ansible-playbook >/dev/null 2>&1; then
                  echo "jq and ansible-playbook are required on self-hosted worker"
                  exit 1
                fi

                image_tag="${{ inputs.IMAGE_TAG }}"
                ssh_key_path="${DEPLOY_SSH_KEY_PATH}"
                known_hosts_path="${DEPLOY_SSH_KNOWN_HOSTS_PATH}"
                chmod 600 "${ssh_key_path}" "${known_hosts_path}"

                tmp_dir=".ci-runtime"
                runtime_vars_file="${tmp_dir}/ansible-runtime-vars.json"
                inventory_file="${tmp_dir}/hosts.yml"
                cleanup() { rm -rf "${tmp_dir}"; }
                trap cleanup EXIT
                mkdir -p "${tmp_dir}"

                jq -n \
                  --arg version "${image_tag}" \
                  --arg image "${{ secrets.MAXBRIDGE_IMAGE_REPO }}:${image_tag}" \
                  --arg domain "${MAXBRIDGE_DOMAIN}" \
                  --arg https_port "${MAXBRIDGE_HTTPS_PORT}" \
                  --arg health_url "https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}/health/ready" \
                  --arg telegram_token "${{ secrets.MAXBRIDGE_TELEGRAM_BOT_TOKEN }}" \
                  --arg max_token "${{ secrets.MAXBRIDGE_MAX_BOT_TOKEN }}" \
                  --arg registry_token "${{ secrets.MAXBRIDGE_REGISTRY_TOKEN }}" \
                  '{maxbridge_version: $version, maxbridge_image: $image, maxbridge_domain: $domain, maxbridge_https_port: ($https_port | tonumber), maxbridge_healthcheck_url: $health_url, maxbridge_telegram_bot_token: $telegram_token, maxbridge_max_bot_token: $max_token, maxbridge_registry_token: $registry_token}' > "${runtime_vars_file}"

                cat > "${inventory_file}" <<INV
                all:
                  hosts:
                    maxbridge-production-1:
                      ansible_host: ${DEPLOY_HOST}
                      ansible_user: ${DEPLOY_USER}
                      ansible_ssh_private_key_file: ${ssh_key_path}
                      ansible_ssh_common_args: '-o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts_path}'
                INV

                ansible-galaxy collection install community.docker
                ansible-playbook -i "${inventory_file}" deploy/ansible/deploy.yml --extra-vars "@${runtime_vars_file}"

                base_url="https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}"
                curl -ksSf "${base_url}/health/ready" >/dev/null
                checks="$(curl -ksSf "${base_url}/health/checks")"
                printf "%s" "${checks}" | jq -e '(.queue | type == "object") and (.queue.pending | type == "number") and (.queue.retry | type == "number") and (.queue.dead_letter | type == "number")' >/dev/null

  rollback-production:
    runs_on: [self-hosted, linux, x64, wsl-deploy]
    inputs:
      ROLLBACK_IMAGE_TAG:
        type: string
        required: true
      PRODUCTION_CONFIRM:
        type: string
        required: true
        description: "Type ROLLBACK_PRODUCTION"
    tasks:
      - name: rollback-production-task
        cubes:
          - name: rollback
            script:
              - |
                set -euo pipefail
                if [ "${{ inputs.PRODUCTION_CONFIRM }}" != "ROLLBACK_PRODUCTION" ]; then
                  echo "Set PRODUCTION_CONFIRM=ROLLBACK_PRODUCTION"
                  exit 1
                fi

                allowed_user="${ALLOWED_PROD_USER:-BetterNetIntellegentHub}"
                if [ "${SC_USER_LOGIN:-}" != "${allowed_user}" ]; then
                  echo "Production rollback is allowed only for ${allowed_user}"
                  exit 1
                fi

                lock_file="/tmp/maxbridge-production.lock"
                exec 9>"${lock_file}"
                flock 9

                for var_name in DEPLOY_HOST DEPLOY_USER MAXBRIDGE_DOMAIN MAXBRIDGE_HTTPS_PORT DEPLOY_SSH_KEY_PATH DEPLOY_SSH_KNOWN_HOSTS_PATH; do
                  value="$(printenv "${var_name}" || true)"
                  if [ -z "${value}" ]; then
                    echo "Missing variable: ${var_name}"
                    exit 1
                  fi
                done

                if ! command -v jq >/dev/null 2>&1 || ! command -v ansible-playbook >/dev/null 2>&1; then
                  echo "jq and ansible-playbook are required on self-hosted worker"
                  exit 1
                fi

                image_tag="${{ inputs.ROLLBACK_IMAGE_TAG }}"
                ssh_key_path="${DEPLOY_SSH_KEY_PATH}"
                known_hosts_path="${DEPLOY_SSH_KNOWN_HOSTS_PATH}"
                chmod 600 "${ssh_key_path}" "${known_hosts_path}"

                tmp_dir=".ci-runtime"
                runtime_vars_file="${tmp_dir}/ansible-runtime-vars.json"
                inventory_file="${tmp_dir}/hosts.yml"
                cleanup() { rm -rf "${tmp_dir}"; }
                trap cleanup EXIT
                mkdir -p "${tmp_dir}"

                jq -n \
                  --arg version "${image_tag}" \
                  --arg image "${{ secrets.MAXBRIDGE_IMAGE_REPO }}:${image_tag}" \
                  --arg domain "${MAXBRIDGE_DOMAIN}" \
                  --arg https_port "${MAXBRIDGE_HTTPS_PORT}" \
                  --arg health_url "https://${MAXBRIDGE_DOMAIN}:${MAXBRIDGE_HTTPS_PORT}/health/ready" \
                  --arg telegram_token "${{ secrets.MAXBRIDGE_TELEGRAM_BOT_TOKEN }}" \
                  --arg max_token "${{ secrets.MAXBRIDGE_MAX_BOT_TOKEN }}" \
                  --arg registry_token "${{ secrets.MAXBRIDGE_REGISTRY_TOKEN }}" \
                  '{maxbridge_version: $version, maxbridge_image: $image, maxbridge_domain: $domain, maxbridge_https_port: ($https_port | tonumber), maxbridge_healthcheck_url: $health_url, maxbridge_telegram_bot_token: $telegram_token, maxbridge_max_bot_token: $max_token, maxbridge_registry_token: $registry_token}' > "${runtime_vars_file}"

                cat > "${inventory_file}" <<INV
                all:
                  hosts:
                    maxbridge-production-1:
                      ansible_host: ${DEPLOY_HOST}
                      ansible_user: ${DEPLOY_USER}
                      ansible_ssh_private_key_file: ${ssh_key_path}
                      ansible_ssh_common_args: '-o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts_path}'
                INV

                ansible-galaxy collection install community.docker
                ansible-playbook -i "${inventory_file}" deploy/ansible/deploy.yml --extra-vars "@${runtime_vars_file}"

